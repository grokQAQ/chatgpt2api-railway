name: Deploy to Hugging Face Space

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install huggingface_hub
        run: pip install huggingface_hub

      - name: Deploy to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          SECRET_AUTH_KEY: ${{ secrets.SECRET_AUTH_KEY }}
          SECRET_DATABASE_URL: ${{ secrets.SECRET_DATABASE_URL }}
          SECRET_PROXY_SUB_URL: ${{ secrets.SECRET_PROXY_SUB_URL }}
        run: |
          python3 << 'PYEOF'
          import os, json, urllib.request
          from huggingface_hub import HfApi

          token = os.environ["HF_TOKEN"]
          api = HfApi(token=token)

          username = api.whoami()["name"]
          space_name = "chat2api-v2"
          repo_id = f"{username}/{space_name}"
          print(f"Target: {repo_id}")

          # 创建 Space
          try:
              api.create_repo(
                  repo_id=repo_id,
                  repo_type="space",
                  space_sdk="docker",
                  private=False,
                  exist_ok=True,
              )
          except Exception as e:
              print(f"Create repo: {e}")

          # 设置 Secrets（直连模式：HF IP 能过 Cloudflare，不需要代理）
          secrets = {
              "CHATGPT2API_AUTH_KEY": os.environ.get("SECRET_AUTH_KEY", "chatgpt2api"),
              "STORAGE_BACKEND": "postgres",
              "DATABASE_URL": os.environ.get("SECRET_DATABASE_URL", ""),
              # 不设 PROXY_SUB_URL - HF 直连 IP 能过 Cloudflare
              # 代理会导致出口 IP 被拦截
              "CHATGPT2API_PROXY_RUNTIME_ENABLED": "true",
              "CHATGPT2API_PROXY_RUNTIME_EGRESS_MODE": "direct",
              "CHATGPT2API_PROXY_RUNTIME_CLEARANCE_ENABLED": "true",
              "CHATGPT2API_PROXY_RUNTIME_CLEARANCE_MODE": "flaresolverr",
              "CHATGPT2API_FLARESOLVERR_URL": "http://127.0.0.1:8191",
              "CHATGPT2API_PROXY_RUNTIME_FORCE": "true",
          }
          headers = {"Authorization": f"Bearer {token}"}

          # 删除旧的 PROXY_SUB_URL secret（HF 直连不需要代理）
          for key_to_delete in ["PROXY_SUB_URL"]:
              req = urllib.request.Request(
                  f"https://huggingface.co/api/spaces/{repo_id}/secrets/{key_to_delete}",
                  headers={**headers},
                  method="DELETE",
              )
              try:
                  urllib.request.urlopen(req)
                  print(f"  Secret DELETED: {key_to_delete}")
              except Exception as e:
                  print(f"  Secret DELETE {key_to_delete}: {e}")

          # 设置 Secrets（直连模式：HF IP 能过 Cloudflare，不需要代理）
          for key, value in secrets.items():
              if not value:
                  print(f"  Secret SKIP: {key} (empty)")
                  continue
              data = json.dumps({"key": key, "value": value}).encode()
              req = urllib.request.Request(
                  f"https://huggingface.co/api/spaces/{repo_id}/secrets",
                  data=data,
                  headers={**headers, "Content-Type": "application/json"},
                  method="POST",
              )
              try:
                  urllib.request.urlopen(req)
                  print(f"  Secret OK: {key}")
              except Exception as e:
                  print(f"  Secret {key}: {e}")

          # 上传源码
          print("Uploading to HF Space...")
          api.upload_folder(
              folder_path=".",
              repo_id=repo_id,
              repo_type="space",
              commit_message="deploy: chatgpt2api (full: API + proxy + FlareSolverr + register)",
              ignore_patterns=[
                  ".git", ".github",
                  "node_modules", ".next",
                  "__pycache__", "*.pyc",
                  ".venv", "data",
                  ".env", ".env.local",
                  "docs", "test",
                  "docker-compose*.yml",
                  ".dockerignore", ".codex",
                  "LICENSE",
                  "entrypoint.sh",
                  "entrypoint-render.sh",
              ],
          )
          print(f"Deployed: https://huggingface.co/spaces/{repo_id}")
          PYEOF
