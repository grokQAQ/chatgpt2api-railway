name: Keep HF Space Alive

on:
  schedule:
    # 每 5 分钟 ping 一次，防止 HF Space 休眠
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping HF Space
        run: |
          curl -fsS --max-time 30 "https://mansui52001-chat2api.hf.space/" > /dev/null && echo "Ping OK" || echo "Ping failed"
