name: Deploy to Render

on:
  workflow_dispatch:

jobs:
  deploy-render:
    runs-on: ubuntu-latest
    steps:
      - name: Create Render Service
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          PROXY_SUB_URL: ${{ secrets.SECRET_PROXY_SUB_URL }}
          DATABASE_URL: ${{ secrets.SECRET_DATABASE_URL }}
          AUTH_KEY: ${{ secrets.SECRET_AUTH_KEY }}
        run: |
          # 构建环境变量 JSON
          ENV_VARS=$(python3 -c "
          import json
          env_vars = [
            {'key': 'PROXY_SUB_URL', 'value': '''$PROXY_SUB_URL'''},
            {'key': 'STORAGE_BACKEND', 'value': 'postgres'},
            {'key': 'DATABASE_URL', 'value': '''$DATABASE_URL'''},
            {'key': 'CHATGPT2API_AUTH_KEY', 'value': '''$AUTH_KEY'''},
            {'key': 'LOG_LEVEL', 'value': 'warning'},
          ]
          print(json.dumps(env_vars))
          ")

          # 创建服务
          PAYLOAD=$(python3 -c "
          import json
          payload = {
            'type': 'web_service',
            'name': 'chatgpt2api-register',
            'repo': 'https://github.com/NapCat52001/chatgpt2api',
            'branch': 'main',
            'plan': 'free',
            'region': 'oregon',
            'dockerfilePath': './Dockerfile.render',
            'envVars': $ENV_VARS
          }
          print(json.dumps(payload))
          ")

          echo "Creating Render service..."
          echo "Payload: $PAYLOAD"

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "https://api.render.com/v1/services" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"
