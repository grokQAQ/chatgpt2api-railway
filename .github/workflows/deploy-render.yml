name: Deploy to Render

on:
  workflow_dispatch:

jobs:
  deploy-render:
    runs-on: ubuntu-latest
    steps:
      - name: Create Render Service
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          PROXY_SUB_URL: ${{ secrets.SECRET_PROXY_SUB_URL }}
          DATABASE_URL: ${{ secrets.SECRET_DATABASE_URL }}
          AUTH_KEY: ${{ secrets.SECRET_AUTH_KEY }}
        run: |
          # 1. 获取 ownerID
          echo "Fetching Render owner ID..."
          OWNERS=$(curl -s -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/owners")
          
          OWNER_ID=$(echo "$OWNERS" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          if isinstance(data, list) and len(data) > 0:
              print(data[0]['owner']['id'])
          ")
          
          if [ -z "$OWNER_ID" ]; then
            echo "ERROR: Could not get owner ID"
            echo "Owners response: $OWNERS"
            exit 1
          fi
          echo "Owner ID: $OWNER_ID"
          
          # 2. 创建服务（使用 serviceDetails）
          PAYLOAD=$(python3 << PYEOF
          import json
          payload = {
            "type": "web_service",
            "name": "chatgpt2api-register",
            "ownerId": "$OWNER_ID",
            "repo": "https://github.com/NapCat52001/chatgpt2api",
            "branch": "main",
            "serviceDetails": {
              "plan": "free",
              "region": "oregon",
              "dockerfilePath": "./Dockerfile.render",
            },
            "envVars": [
              {"key": "PROXY_SUB_URL", "value": "$PROXY_SUB_URL"},
              {"key": "STORAGE_BACKEND", "value": "postgres"},
              {"key": "DATABASE_URL", "value": "$DATABASE_URL"},
              {"key": "CHATGPT2API_AUTH_KEY", "value": "$AUTH_KEY"},
              {"key": "LOG_LEVEL", "value": "warning"},
            ]
          }
          print(json.dumps(payload))
          PYEOF
          )
          
          echo "Creating Render service..."
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "https://api.render.com/v1/services" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")
          
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          
          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"
          
          if [ "$HTTP_CODE" = "201" ] || [ "$HTTP_CODE" = "200" ]; then
            echo "Service created successfully!"
          else
            echo "Service creation failed"
          fi
